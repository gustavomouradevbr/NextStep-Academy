{% extends 'base.html' %} {% block content %}
<div class="header">
  <h1>Previsão de Risco de Evasão</h1>
  <p>
    Insira os dados do estudante para analisar a probabilidade e o impacto de
    cada fator.
  </p>
</div>

<div class="container-previsao">
  <div class="form-box">
    <form action="/" method="POST">
      <label for="frequencia">Frequência Escolar (%):</label>
      <input
        type="number"
        id="frequencia"
        name="frequencia"
        step="0.1"
        min="0"
        max="100"
        required
      />

      <label for="media_notas">Média das Notas (0 a 10):</label>
      <input
        type="number"
        id="media_notas"
        name="media_notas"
        step="0.1"
        min="0"
        max="10"
        required
      />

      <label for="renda_familiar">Renda Familiar:</label>
      <select id="renda_familiar" name="renda_familiar" required>
        <option value="1">Baixa</option>
        <option value="2">Média</option>
        <option value="3">Alta</option>
      </select>

      <label for="idade">Idade do Aluno:</label>
      <input type="number" id="idade" name="idade" min="5" max="100" required />

      <label for="historico_repetencia">Histórico de Repetência:</label>
      <select id="historico_repetencia" name="historico_repetencia" required>
        <option value="0">Não possui</option>
        <option value="1">Sim, possui</option>
      </select>

      <button type="submit">Avaliar Aluno</button>
    </form>
  </div>

  {% if predicao %}
  <div class="result-box">
    <h3>Diagnóstico: <span class="destaque">{{ predicao }}</span></h3>
    <hr style="border: 0; border-top: 1px solid #ecf0f1; margin: 20px 0" />
    <div class="grafico-container">{{ grafico|safe }}</div>
  </div>
  {% endif %}
</div>
{% endblock %}
